<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FMCG Sales Quiz — Chandpur Corporation Ltd.</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D1B4B;--teal:#0D6E6E;--gold:#C9A227;
  --green:#1A7A4A;--red:#C0392B;--amber:#E08C1A;
  --bg:#F4F6FB;--white:#fff;--border:#E2E8F0;
  --text:#1E293B;--muted:#64748B;--light:#F8FAFC;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.header{background:var(--navy);color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.3)}
.header-inner{max-width:860px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.header h1{font-size:17px;font-weight:700}
.header p{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
.score-pill{background:var(--gold);color:var(--navy);font-size:13px;font-weight:700;padding:6px 16px;border-radius:20px}
.progress-bar{height:4px;background:rgba(255,255,255,.15)}
.progress-fill{height:100%;background:var(--gold);transition:width .3s;width:0%}

.main{max-width:860px;margin:0 auto;padding:20px 16px 100px}

.info-card{background:var(--white);border-radius:14px;padding:20px;margin-bottom:20px;border:1px solid var(--border)}
.info-card h2{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:14px}
.info-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;margin-bottom:5px}
.field input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;color:var(--text);background:var(--white)}
.field input:focus{outline:none;border-color:var(--teal)}

.q-card{background:var(--white);border-radius:14px;padding:18px;margin-bottom:12px;border:1.5px solid var(--border);transition:border-color .2s}
.q-card.answered{border-color:var(--teal)}
.q-card.revealed .opt.correct-opt{background:#E8F5E9;border-color:var(--green)}
.q-card.revealed .opt.correct-opt .opt-key{background:var(--green);color:#fff;border-color:var(--green)}
.q-card.revealed .opt.wrong-opt{background:#FFEBEE;border-color:var(--red)}
.q-card.revealed .opt.wrong-opt .opt-key{background:var(--red);color:#fff;border-color:var(--red)}
.q-card.revealed .opt{pointer-events:none}

.q-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.q-num{min-width:32px;height:32px;border-radius:50%;background:var(--bg);color:var(--navy);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1.5px solid var(--border)}
.q-num.done{background:var(--teal);color:#fff;border-color:var(--teal)}
.q-text{font-size:14px;font-weight:600;line-height:1.55}
.q-cat{font-size:10px;color:var(--muted);margin-top:4px;background:var(--bg);padding:2px 8px;border-radius:4px;display:inline-block}

.opts{display:flex;flex-direction:column;gap:7px;margin-bottom:2px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:9px;border:1.5px solid var(--border);cursor:pointer;background:var(--bg);transition:all .15s;user-select:none}
.opt:hover{border-color:var(--teal);background:#EFF9F9}
.opt.selected{border-color:var(--teal);background:#E0F5F5}
.opt-key{font-weight:700;font-size:12px;color:var(--muted);width:24px;height:24px;border-radius:50%;background:var(--white);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.opt.selected .opt-key{background:var(--teal);color:#fff;border-color:var(--teal)}
.opt-text{font-size:13px;line-height:1.45;flex:1}

.exp-box{margin-top:10px;padding:10px 12px;background:#EEF9F6;border-left:3px solid var(--teal);border-radius:0 8px 8px 0;font-size:12px;color:#374151;line-height:1.5;display:none}
.exp-box.show{display:block}

.q-status{font-size:11px;color:var(--teal);margin-top:6px;font-weight:500;min-height:14px}

.footer-bar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:12px 20px;z-index:100;box-shadow:0 -4px 16px rgba(0,0,0,.08)}
.footer-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.ans-info{font-size:13px;color:var(--muted)}
.ans-info strong{color:var(--navy)}
.submit-btn{background:var(--teal);color:#fff;border:none;border-radius:10px;padding:12px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.submit-btn:hover:not(:disabled){background:#0a5959;transform:translateY(-1px)}
.submit-btn:disabled{background:#aaa;cursor:not-allowed}

.result-screen{display:none;text-align:center;padding:40px 20px;max-width:600px;margin:0 auto}
.result-screen.show{display:block}
.result-icon{font-size:64px;margin-bottom:16px}
.result-name{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:8px}
.result-score-big{font-size:72px;font-weight:700;line-height:1;margin:16px 0}
.result-pct{font-size:18px;color:var(--muted);margin-bottom:16px}
.grade-badge{display:inline-block;padding:10px 28px;border-radius:24px;font-size:18px;font-weight:700;margin-bottom:24px}
.grade-A{background:#E8F5E9;color:var(--green)}
.grade-B{background:#FFF8E1;color:var(--amber)}
.grade-C{background:#FFF3E0;color:#E65100}
.grade-F{background:#FFEBEE;color:var(--red)}

.detail-table{width:100%;border-collapse:collapse;text-align:left;margin-bottom:24px;font-size:13px}
.detail-table th{background:var(--navy);color:#fff;padding:8px 10px;font-weight:600}
.detail-table td{padding:7px 10px;border-bottom:1px solid var(--border)}
.detail-table tr:nth-child(even) td{background:var(--light)}
.icon-ok{color:var(--green);font-weight:700}
.icon-ng{color:var(--red);font-weight:700}

.retry-btn{background:var(--navy);color:#fff;border:none;border-radius:10px;padding:12px 32px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px}

.warn-shake{animation:shake .3s;border-color:var(--red)!important}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

@media(max-width:500px){.info-row{grid-template-columns:1fr}.header h1{font-size:14px}}
</style>
</head>
<body>

<div id="quizSection">
  <div class="header">
    <div class="header-inner">
      <div>
        <h1>FMCG Sales Quiz — Ahmed Halim Podcast</h1>
        <p>Chandpur Corporation Ltd. | ২০ MCQ প্রশ্ন | Sales Team Assessment</p>
      </div>
      <div class="score-pill" id="scorePill">০/২০</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
  </div>

  <div class="main" id="mainArea">
    <div class="info-card">
      <h2>👤 আপনার তথ্য দিন</h2>
      <div class="info-row">
        <div class="field"><label>আপনার নাম *</label><input id="uName" placeholder="পূর্ণ নাম লিখুন" type="text"></div>
        <div class="field"><label>ইমেইল / ফোন</label><input id="uEmail" placeholder="ইমেইল বা মোবাইল" type="text"></div>
      </div>
    </div>
    <div id="questionsArea"></div>
  </div>

  <div class="footer-bar">
    <div class="footer-inner">
      <div class="ans-info"><strong id="ansCount">০</strong>/২০ প্রশ্নের উত্তর দেওয়া হয়েছে</div>
      <button class="submit-btn" id="submitBtn" onclick="submitQuiz()">পরীক্ষা জমা দিন →</button>
    </div>
  </div>
</div>

<div class="result-screen" id="resultSection">
  <div class="result-icon" id="rIcon"></div>
  <div class="result-name" id="rName"></div>
  <div style="font-size:15px;color:var(--muted);margin-bottom:8px">Chandpur Corporation Ltd. — FMCG Sales Quiz</div>
  <div class="result-score-big" id="rScore"></div>
  <div class="result-pct" id="rPct"></div>
  <div class="grade-badge" id="rGrade"></div>
  <table class="detail-table" id="rTable">
    <thead><tr><th>#</th><th>প্রশ্ন</th><th>সঠিক উত্তর</th><th>আপনার উত্তর</th><th>ফলাফল</th></tr></thead>
    <tbody id="rBody"></tbody>
  </table>
  <button class="retry-btn" onclick="retryQuiz()">আবার চেষ্টা করুন</button>
</div>

<script>
// ── QUIZ DATA (Excel থেকে এই array আপডেট করুন) ──────────────────────
const QUESTIONS = [
  {id:1,q:"FMCG-তে SR-এর প্রধান কাজ কোনটি?",A:"শুধু মাল ডেলিভারি দেওয়া",B:"টার্গেট অর্জন, সম্পর্ক তৈরি ও কালেকশন করা",C:"অফিসে বসে রিপোর্ট তৈরি করা",D:"শুধু নতুন ডিলার খোঁজা",ans:"B",cat:"মূল ধারণা",exp:"SR-এর মূল দায়িত্ব হলো বিক্রয় টার্গেট অর্জন, ডিলারের সাথে সম্পর্ক তৈরি এবং সময়মতো কালেকশন নিশ্চিত করা।"},
  {id:2,q:"FMCG সেলসে 'চাপাবাজি' পদ্ধতিতে বিক্রির সমস্যা কী?",A:"বেশি পণ্য বিক্রি হয়",B:"ডিলারের সাথে দীর্ঘমেয়াদি সম্পর্ক নষ্ট হয়",C:"কোম্পানির লাভ বাড়ে",D:"কালেকশন সহজ হয়",ans:"B",cat:"বিক্রয় কৌশল",exp:"চাপে বিক্রি করলে স্বল্পমেয়াদে সেলস হয়, কিন্তু ডিলার বিশ্বাস হারায় এবং দীর্ঘমেয়াদে সম্পর্ক ভেঙে পড়ে।"},
  {id:3,q:"একজন SR কীভাবে ডিলারের সাথে সম্পর্ক উন্নত করতে পারেন?",A:"বেশি ছাড় দিয়ে",B:"নিয়মিত ভিজিট ও সমস্যা সমাধান করে",C:"শুধু ফোনে যোগাযোগ রেখে",D:"অন্য ডিলারের গল্প বলে",ans:"B",cat:"কাস্টমার রিলেশন",exp:"নিয়মিত মাঠে যাওয়া, ডিলারের সমস্যা শুনে সমাধান করা এবং বিশ্বস্ততা অর্জনই সম্পর্ক উন্নতির মূল চাবিকাঠি।"},
  {id:4,q:"Ahmed Halim কোন প্রতিষ্ঠানে GM, Sales & Marketing হিসেবে কর্মরত?",A:"PRAN-RFL Group",B:"Square Group",C:"Meghna Group of Industries",D:"ACI Limited",ans:"C",cat:"অতিথি পরিচয়",exp:"Ahmed Halim বর্তমানে Meghna Group of Industries-এ GM, Sales & Marketing পদে কর্মরত।"},
  {id:5,q:"FMCG সেলসে 'সেকেন্ডারি সেলস' বলতে কী বোঝায়?",A:"কোম্পানি থেকে ডিস্ট্রিবিউটরে বিক্রয়",B:"ডিস্ট্রিবিউটর থেকে রিটেইলারে বিক্রয়",C:"রিটেইলার থেকে কনজিউমারে বিক্রয়",D:"কোম্পানি থেকে সরাসরি কনজিউমারে বিক্রয়",ans:"B",cat:"FMCG ধারণা",exp:"Primary = কোম্পানি → ডিস্ট্রিবিউটর। Secondary = ডিস্ট্রিবিউটর → রিটেইলার। SR-এর মূল KPI।"},
  {id:6,q:"টার্গেট অর্জনে ব্যর্থ হলে SR-এর প্রথম করণীয় কী?",A:"পদত্যাগ করা",B:"রুট পরিবর্তন করা",C:"কারণ বিশ্লেষণ করে অ্যাকশন প্ল্যান তৈরি করা",D:"সুপারভাইজারকে দোষ দেওয়া",ans:"C",cat:"পারফরম্যান্স",exp:"ব্যর্থতার কারণ খুঁজে বের করা এবং সেই অনুযায়ী পরিকল্পনা করাই সঠিক পদক্ষেপ।"},
  {id:7,q:"FMCG সেলস ক্যারিয়ারে সফল হওয়ার জন্য সবচেয়ে জরুরি গুণ কোনটি?",A:"শুধু শিক্ষাগত যোগ্যতা",B:"পরিশ্রম, সততা ও শেখার মনোভাব",C:"ভালো পোশাক পরা",D:"উচ্চপদস্থদের সাথে পরিচয়",ans:"B",cat:"ক্যারিয়ার দক্ষতা",exp:"কঠোর পরিশ্রম, সততা এবং প্রতিনিয়ত শেখার আগ্রহই দীর্ঘমেয়াদি সাফল্যের ভিত্তি।"},
  {id:8,q:"ডিলার কালেকশনে বিলম্ব হলে SR কী করবেন?",A:"ডিলারকে নতুন মাল দেওয়া বন্ধ রাখবেন",B:"সরাসরি বাদ দিয়ে দেবেন",C:"বিনয়ের সাথে কারণ জেনে সমাধান খুঁজবেন",D:"ম্যানেজারকে না জানিয়ে নিজে সমাধান করবেন",ans:"C",cat:"কালেকশন ম্যানেজমেন্ট",exp:"কারণ বুঝে সহানুভূতির সাথে সমাধান করলে সম্পর্কও ভালো থাকে।"},
  {id:9,q:"'Route Plan' বা রুট পরিকল্পনার মূল উদ্দেশ্য কী?",A:"SR-এর যাতায়াত কমানো",B:"সব ডিলারের নিয়মিত ভিজিট নিশ্চিত করা",C:"শুধু বড় ডিলারদের দেখা করা",D:"রিপোর্ট লেখা সহজ করা",ans:"B",cat:"মাঠ পর্যায়ের কার্যক্রম",exp:"সুনির্দিষ্ট রুট প্ল্যান থাকলে প্রতিটি ডিলার নিয়মিত কভার হয়।"},
  {id:10,q:"FMCG-তে 'Numeric Distribution' বলতে কী বোঝায়?",A:"মোট বিক্রয়ের পরিমাণ",B:"মোট আউটলেটের মধ্যে কতটিতে পণ্য পাওয়া যায় তার শতকরা হার",C:"পণ্যের দামের তালিকা",D:"মাসিক টার্গেটের পরিমাণ",ans:"B",cat:"FMCG ধারণা",exp:"Numeric Distribution = (পণ্য আছে এমন আউটলেট ÷ মোট আউটলেট) × ১০০।"},
  {id:11,q:"একজন নতুন SR কীভাবে দ্রুত শিখতে পারেন?",A:"শুধু বই পড়ে",B:"মাঠে অভিজ্ঞ SR-এর সাথে কাজ করে ও প্রতিদিন রিভিউ করে",C:"অফিসে বসে থেকে",D:"সোশ্যাল মিডিয়া দেখে",ans:"B",cat:"ক্যারিয়ার দক্ষতা",exp:"মাঠে অভিজ্ঞদের সাথে কাজ করাই নতুন SR-এর সবচেয়ে দ্রুত শেখার পথ।"},

const userAnswers = {};
let quizSubmitted = false;

function buildQuiz() {
  const area = document.getElementById('questionsArea');
  area.innerHTML = QUESTIONS.map((q, i) => `
    <div class="q-card" id="qc${i}">
      <div class="q-header">
        <div class="q-num" id="qn${i}">${i+1}</div>
        <div>
          <div class="q-text">${q.q}</div>
          <div class="q-cat">${q.cat}</div>
        </div>
      </div>
      <div class="opts">
        ${['A','B','C','D'].map(k => `
          <div class="opt" id="opt${i}${k}" onclick="pick(${i},'${k}')">
            <div class="opt-key">${k}</div>
            <div class="opt-text">${q[k]}</div>
          </div>`).join('')}
      </div>
      <div class="q-status" id="qs${i}"></div>
      <div class="exp-box" id="exp${i}">${q.exp}</div>
    </div>`).join('');
}

function pick(qi, key) {
  if(quizSubmitted) return;
  userAnswers[qi] = key;
  ['A','B','C','D'].forEach(k => {
    document.getElementById('opt'+qi+k).classList.remove('selected');
  });
  document.getElementById('opt'+qi+key).classList.add('selected');
  document.getElementById('qc'+qi).classList.add('answered');
  document.getElementById('qn'+qi).classList.add('done');
  document.getElementById('qs'+qi).textContent = '✓ উত্তর নির্বাচিত';
  updateProg();
}

function updateProg() {
  const n = Object.keys(userAnswers).length;
  document.getElementById('ansCount').textContent = n;
  document.getElementById('scorePill').textContent = n+'/20';
  document.getElementById('progFill').style.width = (n/20*100)+'%';
}

function submitQuiz() {
  const name = document.getElementById('uName').value.trim();
  if(!name){ document.getElementById('uName').focus(); alert('অনুগ্রহ করে আপনার নাম দিন।'); return; }

  const missing = QUESTIONS.filter((_,i)=>!userAnswers.hasOwnProperty(i));
  if(missing.length > 0){
    const go = confirm(missing.length+'টি প্রশ্নের উত্তর দেননি। তারপরও জমা দিতে চান?');
    if(!go){
      const firstMissIdx = QUESTIONS.findIndex((_,i)=>!userAnswers.hasOwnProperty(i));
      document.getElementById('qc'+firstMissIdx).scrollIntoView({behavior:'smooth',block:'center'});
      document.getElementById('qc'+firstMissIdx).classList.add('warn-shake');
      setTimeout(()=>document.getElementById('qc'+firstMissIdx).classList.remove('warn-shake'),400);
      return;
    }
  }

  quizSubmitted = true;
  document.getElementById('submitBtn').disabled = true;

  let correct = 0;
  QUESTIONS.forEach((q,i) => {
    const given = userAnswers[i] || '';
    const ok = given === q.ans;
    if(ok) correct++;
    const card = document.getElementById('qc'+i);
    card.classList.add('revealed');
    document.getElementById('opt'+i+q.ans).classList.add('correct-opt');
    if(given && given !== q.ans) document.getElementById('opt'+i+given).classList.add('wrong-opt');
    document.getElementById('exp'+i).classList.add('show');
    document.getElementById('qs'+i).textContent = ok ? '✅ সঠিক' : '❌ ভুল — সঠিক: '+q.ans;
  });

  const pct = Math.round(correct/20*100);
  const grade = pct>=80?'A':pct>=60?'B':pct>=40?'C':'F';
  const gradeText = pct>=80?'A — চমৎকার!':pct>=60?'B — ভালো':pct>=40?'C — মধ্যম':'F — আরও পড়ুন';
  const emoji = pct>=80?'🏆':pct>=60?'👍':pct>=40?'📚':'💪';

  document.getElementById('rIcon').textContent = emoji;
  document.getElementById('rName').textContent = name;
  document.getElementById('rScore').textContent = correct+'/20';
  document.getElementById('rScore').style.color = pct>=80?'var(--green)':pct>=60?'var(--amber)':pct>=40?'#E65100':'var(--red)';
  document.getElementById('rPct').textContent = 'স্কোর: '+pct+'% | সঠিক: '+correct+' | ভুল: '+(20-correct);
  const gb = document.getElementById('rGrade');
  gb.textContent = gradeText;
  gb.className = 'grade-badge grade-'+grade;

  const tbody = document.getElementById('rBody');
  tbody.innerHTML = QUESTIONS.map((q,i)=>{
    const given=userAnswers[i]||'—'; const ok=given===q.ans;
    return `<tr>
      <td>${i+1}</td>
      <td style="font-size:12px">${q.q.substring(0,50)}…</td>
      <td><strong>${q.ans}) ${q[q.ans].substring(0,30)}</strong></td>
      <td>${given!=='—'?given+') '+q[given].substring(0,25):'—'}</td>
      <td class="${ok?'icon-ok':'icon-ng'}">${ok?'✓ সঠিক':'✗ ভুল'}</td>
    </tr>`;
  }).join('');

  document.getElementById('quizSection').style.display='none';
  document.getElementById('resultSection').classList.add('show');
  window.scrollTo({top:0,behavior:'smooth'});
}

function retryQuiz() {
  location.reload();
}

buildQuiz();
</script>
